name: Bluesky — Scan & Preview

on:
  push:
    branches: [main]
    paths:
      - 'obsidian-vault/*.md'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install PyYAML python-dotenv

      - name: Scan for new clippings
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python obsidian-vault/_bluesky/scan.py --notify

      - name: Commit updated queue
        run: |
          git config user.name "NoGoodBot"
          git config user.email "bot@nogood.studio"
          git add obsidian-vault/_bluesky/queue.json
          git diff --staged --quiet || git commit -m "Update Bluesky queue [skip ci]"
          git push
