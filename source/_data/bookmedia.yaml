  - title: "Bitcoin art and making something heavy"
    description: "I was a guest on Citadel Dispatch. We discussed The NoGood Book, building NoGood Radio, integrating open protocols, and why physical art matters in an increasingly digital world."
    category: podcast
    url: "https://fountain.fm/episode/ADC8esvhU6sK2R70VI4B"

  - title: "#11 Up ✌️ NoGood"
    description: "A conversation with Eric and Sync about Bitcoin art, Nostr, old hardware, open-source culture, and building a creative life outside the algorithm."
    category: podcast
    url: "https://fountain.fm/episode/WKPmEft6esngfKvtCJSi"
